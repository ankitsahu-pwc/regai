# SQLite browser for the Reg_Impact app database.
#
# Usage from the project root:
#   docker compose up -d sqlite-web          # start in background
#   docker compose logs -f sqlite-web        # tail logs
#   docker compose stop sqlite-web           # stop without removing
#   docker compose down                      # stop and remove
#
# Then browse to http://localhost:8080
#
# The `./data` folder on the host is bind-mounted to /data inside the
# container, so any change made through the web UI lands in the same
# `data/app.db` file the Streamlit app uses, and vice versa.
#
# SQLite tolerates one writer at a time. If you are actively answering
# questions in the Streamlit cockpit AND editing the same rows through this
# UI, you may see "database is locked" errors on the writer that loses the
# race. For day-to-day inspection this is not an issue. If you want a
# strictly read-only browser, replace the `command:` below with:
#
#   command: sqlite_web -H 0.0.0.0 --read-only /data/app.db

services:
  sqlite-web:
    image: coleifer/sqlite-web:latest
    container_name: reg-impact-sqlite-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    command: sqlite_web -H 0.0.0.0 -x /data/app.db
    environment:
      SQLITE_WEB_PASSWORD: ""
